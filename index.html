<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AI Vision Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            padding: {
              'safe-top': 'env(safe-area-inset-top)',
              'safe-bottom': 'env(safe-area-inset-bottom)',
            },
            colors: {
              'brand-red': '#E31E24',
              'tech-blue': '#2563EB',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --brand-red: #E31E24;
        --tech-blue: #2563EB;
      }
      
      html, body {
        height: 100%;
        width: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
        background-color: #050505;
        font-family: 'Inter', sans-serif;
        color: white;
      }

      #root {
        height: 100%;
        width: 100%;
        position: fixed;
        top: 0;
        left: 0;
        overflow: hidden;
      }

      h1, h2, h3, .hud-text {
        font-family: 'Rajdhani', sans-serif;
      }
      
      /* HUD Scan Animation - Tech Blue */
      @keyframes scan-move {
        0% { top: 0%; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }
      .animate-scan {
        animation: scan-move 3s linear infinite;
        background: linear-gradient(to bottom, transparent, rgba(227, 30, 36, 0.8), transparent);
        box-shadow: 0 0 15px rgba(227, 30, 36, 0.3);
      }

      /* Aperture Spin */
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .animate-spin-slow {
        animation: spin-slow 15s linear infinite;
      }

      /* Pulse Glow - Red */
      @keyframes pulse-red {
        0%, 100% { box-shadow: 0 0 5px var(--brand-red); border-color: rgba(227, 30, 36, 0.5); }
        50% { box-shadow: 0 0 20px var(--brand-red); border-color: rgba(227, 30, 36, 1); }
      }
      .animate-pulse-border {
        animation: pulse-red 2s infinite;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      /* Safe Area Utilities */
      .pb-safe {
        padding-bottom: env(safe-area-inset-bottom);
      }
      .pt-safe {
        padding-top: env(safe-area-inset-top);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.36.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
